<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digestivo | 5 Aprile | Magaparty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;700&display=swap');

        :root {
            --acid-cyan: #00ffcc;
            --acid-magenta: #ff00cc;
            --acid-purple: #9900ff;
            --acid-green: #39ff14;
            --acid-blue: #00d4ff;   
            --acid-yellow: #f3ff00; 
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .brutalist { font-family: 'Archivo Black', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }

        .neon-border-cyan { border: 1px solid var(--acid-cyan); box-shadow: 0 0 15px rgba(0, 255, 204, 0.15); }
        .neon-border-magenta { border: 1px solid var(--acid-magenta); box-shadow: 0 0 15px rgba(255, 0, 204, 0.15); }
        
        .pill-tab {
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.1em;
        }

        .active-tab { background: var(--acid-cyan); color: #000; box-shadow: 0 0 12px rgba(0,255,204,0.4); }
        .inactive-tab { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid rgba(255,255,255,0.05); }

        .scroll-hide::-webkit-scrollbar { display: none; }
        
        @keyframes pulse-logo {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.3)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(255, 0, 204, 0.5)); }
        }

        .logo-image {
            max-width: 180px;
            height: auto;
            margin: 0 auto 10px;
            display: block;
            animation: pulse-logo 3s infinite alternate;
        }

        /* Modal Animation */
        .modal-enter { animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalSlideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x border-white/5 relative pb-28">

    <div class="sticky top-0 z-40 bg-[#050505]/95 backdrop-blur-md border-b border-white/5 shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
        <header class="p-6 pt-10 text-center">
            <div class="flex justify-between items-center w-full mb-6">
                <span class="text-[9px] uppercase tracking-[0.2em] text-gray-500">Magaparty.eventi</span>
                <div class="flex items-center gap-2 text-[--acid-cyan] text-[10px] tracking-widest font-bold uppercase">
                    <span class="w-2 h-2 rounded-full bg-[--acid-cyan] animate-pulse"></span> 5 Apr 2026
                </div>
            </div>
            <img src="logo_digestivo.png" alt="DIGESTIVO®" class="logo-image">
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-50">L'antidoto al pranzo di Pasqua</p>
        </header>

        <div class="flex justify-start gap-3 px-6 py-4 overflow-x-auto scroll-hide">
            <button onclick="switchTab('info')" id="tab-info" class="pill-tab active-tab">INFO</button>
            <button onclick="switchTab('lineup')" id="tab-lineup" class="pill-tab inactive-tab">LINE-UP</button>
            <button onclick="switchTab('orari')" id="tab-orari" class="pill-tab inactive-tab">ORARI</button>
            <button onclick="switchTab('bar')" id="tab-bar" class="pill-tab inactive-tab">BAR MENU</button>
            <button onclick="switchTab('tickets')" id="tab-tickets" class="pill-tab inactive-tab">TICKETS</button>
        </div>
    </div>

    <main class="px-6 pt-6">
        <div id="content-info" class="space-y-8">
            <div class="glass-card p-6 neon-border-cyan text-center">
                <h3 class="brutalist text-xl mb-4 text-[--acid-cyan]">INIZIO TERAPIA</h3>
                <div class="grid grid-cols-4 gap-2 border-t border-white/5 pt-4">
                    <div><span class="block text-2xl font-bold brutalist" id="cd">00</span><span class="text-[9px] opacity-50 uppercase">Giorni</span></div>
                    <div><span class="block text-2xl font-bold brutalist" id="ch">00</span><span class="text-[9px] opacity-50 uppercase">Ore</span></div>
                    <div><span class="block text-2xl font-bold brutalist" id="cm">00</span><span class="text-[9px] opacity-50 uppercase">Min</span></div>
                    <div class="text-[--acid-cyan]"><span class="block text-2xl font-bold brutalist" id="cs">00</span><span class="text-[9px] opacity-50 uppercase">Sec</span></div>
                </div>
            </div>

            <div class="glass-card p-5 border-white/10">
                <h4 class="text-[10px] tracking-widest uppercase text-[--acid-magenta] mb-3">Assistente Clinico AI</h4>
                <textarea id="aiInput" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-xs mb-3 text-white focus:border-[--acid-magenta] outline-none" placeholder="Cosa hai mangiato a Pasqua? Ti dirò se sopravviverai..."></textarea>
                <button id="diagnosisBtn" onclick="getDiagnosis()" class="w-full bg-white/5 border border-white/10 py-3 text-[10px] font-bold tracking-widest uppercase hover:bg-white/10 transition-all">Genera Referto Medico ✨</button>
                <div id="aiResponse" class="hidden mt-4 p-4 bg-[--acid-magenta]/5 border-l-2 border-[--acid-magenta]">
                    <p id="aiText" class="text-xs italic text-gray-300"></p>
                </div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="p-5">
                    <h3 class="brutalist text-2xl mb-1">MAGA HOUSE</h3>
                    <p class="text-[11px] text-gray-400 mb-4">Via Maiori 1, Pontecagnano Faiano (SA)</p>
                    <a href="https://maps.google.com" target="_blank" class="inline-flex items-center gap-2 bg-[--acid-cyan]/10 border border-[--acid-cyan]/30 text-[--acid-cyan] px-4 py-2 rounded-lg text-[10px] uppercase font-bold">Apri Mappa</a>
                </div>
            </div>
        </div>

        <div id="content-lineup" class="hidden text-center py-10 opacity-50 text-xs">Line-up in caricamento...</div>
        <div id="content-orari" class="hidden text-center py-10 opacity-50 text-xs">Orari in caricamento...</div>
        <div id="content-bar" class="hidden text-center py-10 opacity-50 text-xs">Menu in caricamento...</div>
        <div id="content-tickets" class="hidden text-center py-10 opacity-50 text-xs">Biglietti in caricamento...</div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-black via-black/90 to-transparent z-50">
        <button onclick="openModal()" class="w-full bg-[--acid-cyan] text-black font-black py-4 rounded-xl brutalist text-lg tracking-widest shadow-[0_0_20px_rgba(0,255,204,0.3)]">
            METTITI IN LISTA
        </button>
    </div>

    <script>
        function switchTab(tabId) {
            ['info', 'lineup', 'orari', 'bar', 'tickets'].forEach(id => {
                document.getElementById(`content-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.replace('active-tab', 'inactive-tab');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.replace('inactive-tab', 'active-tab');
        }

        // Countdown Logic
        function updateCountdown() {
            const target = new Date('2026-04-05T19:00:00');
            const diff = target - new Date();
            if (diff <= 0) return;
            document.getElementById('cd').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('ch').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('cm').innerText = Math.floor((diff / (1000 * 60)) % 60).toString().padStart(2, '0');
            document.getElementById('cs').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // AI Diagnosis
        async function getDiagnosis() {
            const btn = document.getElementById('diagnosisBtn');
            const resText = document.getElementById('aiText');
            document.getElementById('aiResponse').classList.remove('hidden');
            resText.innerText = "Analisi clinica in corso...";
            
            // Simula risposta se API key non è presente
            setTimeout(() => {
                resText.innerText = "Diagnosi: saturazione totale da lasagne. Prescrizione: due Jagerbomb appena arrivi al party per sbloccare il metabolismo.";
            }, 1500);
        }
    </script>
</body>
</html>
